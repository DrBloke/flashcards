<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="auto" style="max-width:400px; display:block; margin: 0 auto; background-color: var(--wa-color-gray-100); border-radius: 8px;">

    <!-- Conical Flask -->
    <path d="M 55 180 L 75 180 L 75 190 L 110 250 L 20 250 L 55 190 Z" fill="none" stroke="#000" stroke-width="2" />
    <rect x="55" y="170" width="20" height="15" fill="#555" />
    <!-- Liquid & Bubbles -->
    <path d="M 35 220 L 95 220 L 105 248 L 25 248 Z" fill="#ddddff" opacity="0.6" />
    <circle cx="50" cy="240" r="3" fill="#fff" />
    <circle cx="70" cy="235" r="4" fill="#fff" />
    <circle cx="65" cy="225" r="2" fill="#fff" />
    <!-- Tube -->
    <path d="M 65 175 L 65 130 L 130 130" fill="none" stroke="#000" stroke-width="3" />
    <!-- Gas Syringe -->
    <rect x="130" y="110" width="160" height="40" fill="none" stroke="#000" stroke-width="2" rx="4" />
    <line x1="150" y1="110" x2="150" y2="115" stroke="#000" stroke-width="1" />
    <line x1="170" y1="110" x2="170" y2="115" stroke="#000" stroke-width="1" />
    <line x1="190" y1="110" x2="190" y2="115" stroke="#000" stroke-width="1" />
    <line x1="210" y1="110" x2="210" y2="115" stroke="#000" stroke-width="1" />
    <line x1="230" y1="110" x2="230" y2="115" stroke="#000" stroke-width="1" />
    <!-- Plunger -->
    <rect x="250" y="115" width="80" height="30" fill="#aaa" stroke="#000" stroke-width="2" />
    <rect x="330" y="105" width="10" height="50" fill="#888" stroke="#000" stroke-width="2" />
    <text x="65" y="270" font-family="sans-serif" font-size="14" text-anchor="middle">Reaction Mixture</text>
    <text x="210" y="175" font-family="sans-serif" font-size="14" text-anchor="middle">Gas Syringe</text>
  
</svg>