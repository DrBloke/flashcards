<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="auto" style="max-width:400px; display:block; margin: 0 auto; background-color: var(--wa-color-gray-100); border-radius: 8px;">

    <!-- Left Beaker -->
    <path d="M 60 140 L 60 250 L 160 250 L 160 140" fill="none" stroke="#000" stroke-width="2" />
    <rect x="62" y="170" width="96" height="78" fill="#ccccff" opacity="0.6" />
    <!-- Left Electrode -->
    <rect x="80" y="100" width="20" height="120" fill="#999" stroke="#000" />
    <text x="80" y="85" font-family="sans-serif" font-size="14">Zn (s)</text>
    <!-- Right Beaker -->
    <path d="M 240 140 L 240 250 L 340 250 L 340 140" fill="none" stroke="#000" stroke-width="2" />
    <rect x="242" y="170" width="96" height="78" fill="#99ccff" opacity="0.6" />
    <!-- Right Electrode -->
    <rect x="300" y="100" width="20" height="120" fill="#cc9966" stroke="#000" />
    <text x="300" y="85" font-family="sans-serif" font-size="14">Cu (s)</text>
    <!-- Salt Bridge -->
    <path d="M 140 200 L 140 120 A 60 60 0 0 1 260 120 L 260 200" fill="none" stroke="#aaa" stroke-width="15" />
    <text x="160" y="100" font-family="sans-serif" font-size="12">Salt Bridge (KNO3)</text>
    <!-- Wires and Voltmeter -->
    <line x1="90" y1="100" x2="90" y2="40" stroke="#000" stroke-width="2" />
    <line x1="90" y1="40" x2="180" y2="40" stroke="#000" stroke-width="2" />
    <line x1="220" y1="40" x2="310" y2="40" stroke="#000" stroke-width="2" />
    <line x1="310" y1="40" x2="310" y2="100" stroke="#000" stroke-width="2" />
    <circle cx="200" cy="40" r="20" fill="#fff" stroke="#000" stroke-width="2" />
    <text x="194" y="45" font-family="sans-serif" font-size="16">V</text>
  
</svg>